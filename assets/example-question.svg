<svg xmlns="http://www.w3.org/2000/svg" width="760" height="498" viewBox="0 0 760 498" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="498" rx="14" fill="#0d1117"/>
  <rect x="18" y="18" width="724" height="462" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- header row -->
  <text x="44" y="56" fill="#8b949e" font-size="12" letter-spacing="1.5">PLAN-GRILL · ASKUSERQUESTION</text>
  <rect x="600" y="40" width="116" height="24" rx="12" fill="#1f6feb22" stroke="#1f6feb" stroke-width="1"/>
  <text x="658" y="56" fill="#58a6ff" font-size="12" text-anchor="middle" font-weight="600">Cache scope</text>

  <!-- question -->
  <text x="44" y="98" fill="#e6edf3" font-size="20" font-weight="700">What should be available offline?</text>

  <!-- option 1 (recommended) -->
  <rect x="40" y="120" width="680" height="92" rx="9" fill="#0d1117" stroke="#2ea04366" stroke-width="1.5"/>
  <circle cx="64" cy="150" r="7" fill="none" stroke="#3fb950" stroke-width="2"/>
  <circle cx="64" cy="150" r="3" fill="#3fb950"/>
  <text x="84" y="155" fill="#e6edf3" font-size="15" font-weight="700">Last-viewed area only</text>
  <rect x="262" y="141" width="112" height="20" rx="10" fill="#2ea04322" stroke="#3fb950" stroke-width="1"/>
  <text x="318" y="155" fill="#3fb950" font-size="11" text-anchor="middle" font-weight="700">RECOMMENDED</text>
  <text x="84" y="180" fill="#8b949e" font-size="13">Cheapest to build; caches tiles + features for wherever you last were.</text>
  <text x="84" y="199" fill="#8b949e" font-size="13">Covers the U-Bahn case. Tradeoff: nothing offline in a fresh area.</text>

  <!-- option 2 -->
  <rect x="40" y="222" width="680" height="70" rx="9" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="64" cy="246" r="7" fill="none" stroke="#6e7681" stroke-width="2"/>
  <text x="84" y="251" fill="#e6edf3" font-size="15" font-weight="700">All of Berlin, prefetched</text>
  <text x="84" y="276" fill="#8b949e" font-size="13">Works anywhere. Tradeoff: large download, storage footprint, prefetch UX.</text>

  <!-- option 3 -->
  <rect x="40" y="302" width="680" height="70" rx="9" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="64" cy="326" r="7" fill="none" stroke="#6e7681" stroke-width="2"/>
  <text x="84" y="331" fill="#e6edf3" font-size="15" font-weight="700">Favorites + their surroundings</text>
  <text x="84" y="356" fill="#8b949e" font-size="13">Caches around saved fountains. Tradeoff: useless if nothing is saved.</text>

  <!-- other option -->
  <rect x="40" y="382" width="680" height="40" rx="9" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="84" y="407" fill="#6e7681" font-size="13" font-style="italic">Other… (type your own answer)</text>

  <!-- footer hint -->
  <text x="44" y="455" fill="#6e7681" font-size="12">↑↓ navigate   ⏎ select   ·   Claude leads with its pick + the why; you decide.</text>
</svg>
